<!DOCTYPE html><html lang=en><head><meta charset=UTF-8><meta name=viewport content="width=device-width, initial-scale=1.0"><title>Wittikay Logo ASCII 3D</title><style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: transparent;
        color: #fff;
        height: 100%;
        width: 100%;
        overflow: hidden;
        zoom: 0.65;
      }
      .wrap {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        width: 100%;
      }
      pre {
        font-family: "Courier New", monospace;
        font-size: 8px;
        line-height: 8px;
        margin: 0;
        white-space: pre;
        user-select: none;
        padding: 50px;
        box-sizing: border-box;
        cursor: grab;
        touch-action: none;
      }
    </style></head><body><div class=wrap><pre id=ascii></pre></div><script>
      const img = new Image();
      img.src = "./images/wittikay-logo.png";

      const chars = " .:-=+*#%@";
      const asciiEl = document.getElementById("ascii");
      let targetX = 0;
      let targetY = 0;
      let currentX = 0;
      let currentY = 0;
      let isDragging = false;
      let lastX = 0;
      let lastY = 0;
      const dragSpeed = 0.005;
      const followStrength = 0.12;
      const maxAngle = 0.35;
      let lastTime = 0;
      let lastCursorTime = 0;

      let sampleCols = 140;
      const zScale = 40;
      const perspective = 120;
      let frameScale = 0.55;

      let points = [];
      let width = 0;
      let height = 0;

      function buildPoints() {
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");

        width = sampleCols;
        const scale = width / img.width;
        height = Math.round(img.height * scale);

        canvas.width = width;
        canvas.height = height;
        ctx.drawImage(img, 0, 0, width, height);

        const data = ctx.getImageData(0, 0, width, height).data;
        points = [];

        for (let y = 0; y < height; y++) {
          for (let x = 0; x < width; x++) {
            const idx = (y * width + x) * 4;
            const r = data[idx];
            const g = data[idx + 1];
            const b = data[idx + 2];
            const a = data[idx + 3];
            if (a < 50) continue;
            const lum = (0.2126 * r + 0.7152 * g + 0.0722 * b) / 255;
            const charIndex = Math.floor(lum * (chars.length - 1));
            const z = (1 - lum) * zScale;
            points.push({ x, y, z, c: chars[charIndex] });
          }
        }
      }

      const resolutionScale = 2.5;

      function updateFrameScale() {
        if (window.innerWidth <= 650) {
          frameScale = 0.75;
        } else if (window.innerWidth <= 950) {
          frameScale = 0.65;
        } else {
          frameScale = 0.55;
        }
      }

      function updateSize() {
        updateFrameScale();
        const preStyle = getComputedStyle(asciiEl);
        const fontSize = parseFloat(preStyle.fontSize);
        const lineHeight = parseFloat(preStyle.lineHeight);
        const padding = parseFloat(preStyle.paddingLeft) * 2;
        const availW = Math.max(0, window.innerWidth - padding);
        const availH = Math.max(0, window.innerHeight - padding);
        const cols = Math.max(30, Math.floor((availW / fontSize) * resolutionScale));
        const rows = Math.max(15, Math.floor((availH / lineHeight) * resolutionScale));
        sampleCols = cols;
        width = cols;
        height = rows;
        buildPoints();
      }

      function render(time) {
        const dt = lastTime ? (time - lastTime) / 1000 : 0;
        lastTime = time;
        if (isDragging) {
          currentX = targetX;
          currentY = targetY;
        } else {
          const decay = Math.exp(-dt / 5);
          targetX *= decay;
          targetY *= decay;
          currentX += (targetX - currentX) * followStrength;
          currentY += (targetY - currentY) * followStrength;
        }
        const idleDelay = 2;
        const idleAngle = Math.sin(time * 0.0003) * 0.12;
        const useIdle = !isDragging && lastCursorTime && (time - lastCursorTime) / 1000 > idleDelay;
        const angleX = currentY;
        const angleY = currentX + (useIdle ? idleAngle : 0);
        const cosX = Math.cos(angleX);
        const sinX = Math.sin(angleX);
        const cosY = Math.cos(angleY);
        const sinY = Math.sin(angleY);

        const outW = width;
        const outH = height;
        const zBuffer = new Array(outW * outH).fill(-Infinity);
        const out = new Array(outW * outH).fill(" ");

        for (const p of points) {
          const cx = p.x - outW / 2;
          const cy = p.y - outH / 2;
          const cz = p.z;

          // rotate around X then Y for a conical motion
          let y = cy * cosX - cz * sinX;
          let z = cy * sinX + cz * cosX;
          let x = cx * cosY + z * sinY;
          z = -cx * sinY + z * cosY;

          const scale = (perspective / (perspective + z)) * frameScale;
          const sx = Math.round(x * scale + outW / 2);
          const sy = Math.round(y * scale + outH / 2);

          if (sx < 0 || sx >= outW || sy < 0 || sy >= outH) continue;
          const idx = sy * outW + sx;
          if (z > zBuffer[idx]) {
            zBuffer[idx] = z;
            out[idx] = p.c;
          }
        }

        let lines = [];
        for (let y = 0; y < outH; y++) {
          lines.push(out.slice(y * outW, y * outW + outW).join(""));
        }
        asciiEl.textContent = lines.join("\n");
        requestAnimationFrame(render);
      }

      window.addEventListener("pointermove", (event) => {
        if (isDragging) return;
        lastCursorTime = event.timeStamp;
        const nx = event.clientX / window.innerWidth;
        const ny = event.clientY / window.innerHeight;
        const cx = (nx - 0.5) * 2;
        const cy = (ny - 0.5) * 2;
        targetX = Math.max(-maxAngle, Math.min(maxAngle, -cx * maxAngle));
        targetY = Math.max(-maxAngle, Math.min(maxAngle, cy * maxAngle));
      });

      window.addEventListener("message", (event) => {
        const data = event.data || {};
        if (data.type === "cursor") {
          if (isDragging) return;
          const cx = (data.x - 0.5) * 2;
          const cy = (data.y - 0.5) * 2;
          targetX = Math.max(-maxAngle, Math.min(maxAngle, -cx * maxAngle));
          targetY = Math.max(-maxAngle, Math.min(maxAngle, cy * maxAngle));
        }
        if (data.type === "dragStart") {
          isDragging = true;
        }
        if (data.type === "drag") {
          targetX += data.dx * dragSpeed;
          targetY += data.dy * dragSpeed;
        }
        if (data.type === "dragEnd") {
          isDragging = false;
        }
      });

      asciiEl.addEventListener("pointerdown", (event) => {
        isDragging = true;
        lastX = event.clientX;
        lastY = event.clientY;
        targetX = currentX;
        targetY = currentY;
        asciiEl.setPointerCapture(event.pointerId);
        event.preventDefault();
      });

      window.addEventListener("pointermove", (event) => {
        if (!isDragging) return;
        const dx = event.clientX - lastX;
        const dy = event.clientY - lastY;
        lastX = event.clientX;
        lastY = event.clientY;
        targetX += dx * dragSpeed;
        targetY += dy * dragSpeed;
        event.preventDefault();
      });

      window.addEventListener("pointerup", (event) => {
        isDragging = false;
        asciiEl.releasePointerCapture(event.pointerId);
      });

      window.addEventListener("pointercancel", () => {
        isDragging = false;
      });

      img.onload = () => {
        updateSize();
        requestAnimationFrame(render);
      };

      window.addEventListener("resize", () => {
        updateSize();
      });
    </script></body></html>
