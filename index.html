<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>wittikay's landing page</title>
    <link rel="stylesheet" href="./pages/index.css" />
  </head>
  <body background="./images/background.jpeg">
    <div class="page">
      <div class="backgroundGradient">
        <nav class="navbar">
          <img
            src="./images/wittikay-name.png"
            alt="wittikay"
            class="navbar__nickname"
          />
          <img
            src="./images/wittikay-logo.png"
            alt="An illustration of the fictional character, wittikay. It can be described as a face that resembles a panther with a mustache, although its true meaning is still unclear. Explaining it with words is as effective as deducing it with eyes."
            class="navbar__logo"
          />
          <div class="navbar__links">
          <a class="navbar__link" href="#projects">
            <img src="./images/projects-name.png" alt="Projects" />
          </a>
          <a class="navbar__link" href="#about">
            <img src="./images/about-name.png" alt="About" />
          </a>
          <a class="navbar__link" href="#contact">
            <img src="./images/contact-name.png" alt="Contact" />
          </a>
        </div>
        </nav>
        <section class="home">
          <div class="home__page">
            <img
              src="./images/page-welcome-image.png"
              alt="Welcome message"
              class="home__page-welcome"
            />
          </div>
        </section>
      </div>
      <section class="projects">
        <div class="section__container">
          <img
            src="./images/projects-name.png"
            alt="Projects"
            class="section__title"
          />
          <ul id="projects" class="projects__list"></ul>
          </ul>
        </div>
      </section>
      <section id="social" class="social">
        <div class="section__container">
          <img
            src="./images/socials-name.png"
            alt="Socials"
            class="section__title"
          />
          <ul id="socials" class="social__list"></ul>
          </ul>
        </div>
      </section>
    </div>
    <script src="./pages/index.js" defer></script>
  </body>
</html>
