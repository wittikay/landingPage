<!DOCTYPE html><html lang=en><head><meta charset=UTF-8><meta name=viewport content="width=device-width, initial-scale=1.0"><title>wittikay's landing page</title><link rel=stylesheet href=./pages/index.css></head><body background=./images/background.jpeg><div class=page><div class=backgroundGradient><div class=ascii-bg aria-hidden=true><iframe src=./ascii-3d.html title="wittikay logo ascii background" loading=lazy></iframe></div><nav class=navbar><img src=./images/wittikay-name.png alt=wittikay class=navbar__nickname><div class=navbar__links><a class=navbar__link href=#projects><img src=./images/projects-name.png alt=Projects></a><a class=navbar__link href=#about><img src=./images/about-name.png alt=About></a><a class=navbar__link href=#contact><img src=./images/contact-name.png alt=Contact></a></div></nav><section class=home><div class=home__page><img src=./images/page-welcome-image.png alt="Welcome message" class=home__page-welcome></div></section></div><section class=projects><div class=section__container><img src=./images/projects-name.png alt=Projects class="section__title section__title--projects"><ul id=projects class=projects__list></ul></ul></div></section><section id=social class=social><div class=section__container><img src=./images/socials-name.png alt=Socials class=section__title><ul id=socials class=social__list></ul></ul></div></section></div><script src=./pages/index.js defer></script><script>const asciiFrame=document.querySelector('.ascii-bg iframe');let dragging=false,lastX=0,lastY=0;const send=(type,payload)=>{if(!asciiFrame||!asciiFrame.contentWindow)return;asciiFrame.contentWindow.postMessage({type,...payload},'*')};window.addEventListener('pointermove',e=>{const x=e.clientX/window.innerWidth,y=e.clientY/window.innerHeight;send('cursor',{x,y});if(dragging){const dx=e.clientX-lastX,dy=e.clientY-lastY;lastX=e.clientX;lastY=e.clientY;send('drag',{dx,dy})}});window.addEventListener('pointerdown',e=>{dragging=true;lastX=e.clientX;lastY=e.clientY;send('dragStart',{})});window.addEventListener('pointerup',()=>{if(!dragging)return;dragging=false;send('dragEnd',{})});window.addEventListener('pointercancel',()=>{if(!dragging)return;dragging=false;send('dragEnd',{})});</script></body></html>
